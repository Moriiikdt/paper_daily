name: Daily Audio/Speech AI Papers

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

# Only one run at a time; cancel stale in-progress runs
concurrency:
  group: arxiv-daily-deploy
  cancel-in-progress: true

jobs:
  build:
    # Prevent self-trigger: skip if the last commit was made by github-actions[bot]
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event_name != 'push' ||
      github.event_name == 'push' && !(
        startsWith(github.event.head_commit.author.email, '41898282+github-actions') &&
        endsWith(github.event.head_commit.author.email, '@users.noreply.github.com')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install arxiv requests jinja2 beautifulsoup4 lxml

    - name: Run pipeline (daily only)
      run: python scripts/fetch_and_filter.py >> $GITHUB_STEP_SUMMARY 2>&1
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}

    - name: Push changes
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # Remove generated files that should stay untracked
        git restore --source=HEAD -- index.html list.html reports.json 2>/dev/null || true
        rm -f index.html list.html reports.json
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          # Fetch latest remote, reset local to it, then apply staged changes
          git fetch --depth=1 origin main
          git reset --hard origin/main
          git add -A
          git commit -m "$(git log -1 --format='%s' | head -1)" || true
          # Use force-with-lease to protect against races
          git push origin main --force-with-lease || echo "Push skipped (concurrent run)"
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v4
      if: success()

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4
      if: success()
