name: Daily Audio/Speech AI Papers

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

# Only one workflow run at a time — cancel stale ones
concurrency:
  group: arxiv-daily-deploy
  cancel-in-progress: true

jobs:
  build:
    # Self-trigger guard: skip if last commit was made by github-actions[bot
    # (prevents infinite loop: bot push → workflow → bot push → ...)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE:  ${{ secrets.OPENAI_API_BASE }}
      OPENAI_MODEL:     gpt-5.4
    permissions:
      contents: write
      pages: write
      id-token: write
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install arxiv requests jinja2 beautifulsoup4 lxml

    # ── Run pipeline FIRST ───────────────────────────────────────────────────
    # This generates: reports.json, index.html, list.html, daily_html/*.html,
    # daily_json/*.json in the repo root / working directory.
    - name: Run pipeline
      run: python scripts/fetch_and_filter.py --force

    # ── Stage + commit + push reports.json (tracked in git) ─────────────────
    # Only reports.json is tracked — it's a tiny JSON list of available reports.
    # index.html and list.html are generated each run (not tracked).
    - name: Commit and push reports.json
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add reports.json

        if git diff --cached --quiet; then
          echo "No change to reports.json"
        else
          git commit -m "Update papers $(date -u +'%Y-%m-%d')"
          git push origin main || echo "Push skipped (concurrent run)"
        fi

    # ── Upload Pages artifact LAST (after all git ops) ─────────────────────
    # Upload everything in the working directory (generated HTML, tracked files).
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      if: success()
