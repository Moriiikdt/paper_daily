name: Daily Audio/Speech AI Papers

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: arxiv-daily-deploy
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE:  ${{ secrets.OPENAI_API_BASE }}
      OPENAI_MODEL:     gpt-5.4
    permissions:
      contents: write
      pages: write
      id-token: write
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install arxiv requests jinja2 beautifulsoup4 lxml
        python -c "import arxiv, requests, jinja2, bs4; print('All deps OK')"


    - name: Run pipeline
      run: |
        set -x
        python -u scripts/fetch_and_filter.py --force
        echo "Exit code: $?"

    - name: Debug generated files
      run: |
        echo "=== reports.json ==="
        cat reports.json
        echo "=== daily_html/ ==="
        ls -la daily_html/ 2>/dev/null || echo "daily_html/ NOT FOUND"
        echo "=== daily_json/ ==="
        ls -la daily_json/ 2>/dev/null || echo "daily_json/ NOT FOUND"

    - name: Commit and push reports.json
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git fetch --depth=1 origin main
        git add reports.json
        if git diff --cached --quiet; then
          echo "No change to reports.json"
        else
          git commit -m "Update papers $(date -u +'%Y-%m-%d')"
          git push origin main || echo "Push skipped"
        fi

    # Copy generated files to public/ (git-tracked) for deployment
    - name: Stage generated files for deployment
      run: |
        # Copy generated files into public/ (git-tracked, will override gitignored dirs)
        mkdir -p public/daily_html public/daily_json
        cp -r daily_html/* public/daily_html/ 2>/dev/null && echo "Copied daily_html/ ($(ls daily_html/ | wc -l) files)" || echo "daily_html/ empty or missing"
        cp -r daily_json/* public/daily_json/ 2>/dev/null && echo "Copied daily_json/ ($(ls daily_json/ | wc -l) files)" || echo "daily_json/ empty or missing"
        cp -f index.html list.html reports.json public/
        echo "=== public/ contents ==="
        ls -la public/
        ls -la public/daily_html/ 2>/dev/null || echo "public/daily_html/ empty"
        ls -la public/daily_json/ 2>/dev/null || echo "public/daily_json/ empty"
        echo "=== reports.json ==="
        cat public/reports.json

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'public'

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      if: success()
