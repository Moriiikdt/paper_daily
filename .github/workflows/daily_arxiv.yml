name: Daily Audio/Speech AI Papers

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: arxiv-daily-deploy
  cancel-in-progress: true

jobs:
  build:
    # Self-trigger guard: skip if the push commit was made by github-actions[bot]
    # Runs for: schedule trigger, workflow_dispatch, AND human pushes
    # Skips for: bot-push triggered runs
    if: >-
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install arxiv requests jinja2 beautifulsoup4 lxml

    - name: Run pipeline
      run: python scripts/fetch_and_filter.py

    - name: Push changes
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # Remove tracked generated files (they are gitignored but may be in HEAD)
        git rm -f index.html list.html reports.json 2>/dev/null || true
        rm -f index.html list.html reports.json
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          # Fetch latest remote, reset to it, then apply our staged changes
          git fetch --depth=1 origin main
          git reset --hard origin/main
          # Clean stale generated files that were in the remote
          rm -f index.html list.html reports.json
          git add -A
          git commit -m "Update papers $(date -u +'%Y-%m-%d')" || true
          git push origin main --force-with-lease || echo "Push skipped (concurrent run)"
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v4
      if: success()

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4
      if: success()
