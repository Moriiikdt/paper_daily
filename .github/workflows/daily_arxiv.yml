name: Daily Audio/Speech AI Papers

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: arxiv-daily-deploy
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_BASE:  ${{ secrets.OPENAI_API_BASE }}
      OPENAI_MODEL:     gpt-5.4
    permissions:
      contents: write
      pages: write
      id-token: write
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install arxiv requests jinja2 beautifulsoup4 lxml

    - name: Run pipeline
      run: python scripts/fetch_and_filter.py --force

    - name: Debug generated files
      run: |
        echo "=== reports.json ==="
        cat reports.json
        echo "=== daily_html/ ==="
        ls -la daily_html/ 2>/dev/null || echo "daily_html/ NOT FOUND"
        echo "=== daily_json/ ==="
        ls -la daily_json/ 2>/dev/null || echo "daily_json/ NOT FOUND"

    - name: Commit and push reports.json
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git fetch --depth=1 origin main
        git add reports.json
        if git diff --cached --quiet; then
          echo "No change to reports.json"
        else
          git commit -m "Update papers $(date -u +'%Y-%m-%d')"
          git push origin main || echo "Push skipped"
        fi

    # Force-add gitignored generated files (daily_html/ is in .gitignore but must be deployed)
    - name: Stage generated HTML for deployment
      run: |
        echo "=== Files in working directory BEFORE staging ==="
        find . -maxdepth 3 -type f | grep -v ".git/" | sort
        echo ""
        echo "=== daily_html/ ==="
        ls -la daily_html/ 2>/dev/null || echo "daily_html/ NOT FOUND"
        echo "=== daily_json/ ==="
        ls -la daily_json/ 2>/dev/null || echo "daily_json/ NOT FOUND"
        echo ""
        echo "=== Staging files ==="
        git add -f daily_html/ daily_json/ || echo "  -> daily_html/json add failed or empty"
        git add -f index.html list.html reports.json || echo "  -> static files add failed"
        echo ""
        echo "=== Staged files ==="
        git status --short

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      if: success()
