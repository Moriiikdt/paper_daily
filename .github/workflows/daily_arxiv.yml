name: Daily Audio/Speech AI Papers

on:
  schedule:
    # Run at 04:00 UTC daily
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run paper fetcher
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
        OPENAI_MODEL: gpt-5.4
      run: python src/main.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add daily_json/ daily_html/ index.html list.html reports.json
        
        # Check if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          # Skip if this commit was made by ourselves (prevent infinite loop)
          LAST_AUTHOR=$(git log -1 --format='%ae')
          if [[ "$LAST_AUTHOR" == *"github-actions[bot]"* ]]; then
            echo "Skipping commit - triggered by own previous run"
          else
            git commit -m "Update papers $(date +'%Y-%m-%d')"
            git push
          fi
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
