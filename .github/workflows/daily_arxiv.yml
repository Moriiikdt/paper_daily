name: Daily Audio/Speech AI Papers

on:
  schedule:
    - cron: "0 1 * * *"   # Run at 01:00 UTC daily
  workflow_dispatch:       # Manual trigger
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build:
    # Skip if triggered by our own bot commit (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install feedparser requests beautifulsoup4 lxml

    # ── Run paper pipeline ──────────────────────────────────────────────
    - name: Run paper fetcher
      run: python scripts/fetch_and_filter.py >> $GITHUB_STEP_SUMMARY 2>&1
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}

    # ── Prevent self-trigger: amend commit so the next run sees bot actor
    # After this amend, github.actor will be 'github-actions[bot]' and
    # the `if: github.actor != 'github-actions[bot]'` guard will skip it.
    - name: Mark as bot commit
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit --amend --no-edit --allow-empty
          git push origin ${{ github.ref }}
        fi

    # ── Deploy GitHub Pages ─────────────────────────────────────────────
    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
