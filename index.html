<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio/Speech AI Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;}
        body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;display:flex;flex-direction:column;background:#f9f8f6}

        /* Top bar */
        .topbar{background:#0f172a;color:#fff;padding:.55rem 2rem;display:flex;align-items:center;justify-content:space-between;font-size:.78rem;flex-shrink:0}
        .topbar-brand{font-weight:700;font-size:.88rem;color:#fff}
        .topbar-brand span{color:#60a5fa}
        .topbar-nav a{color:#94a3b8;margin-left:1.25rem;transition:color .2s}
        .topbar-nav a:hover{color:#fff;text-decoration:none}

        /* Hero strip */
        .hero-strip{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:1.5rem 2rem;flex-shrink:0}
        .hero-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap}
        .hero-text h1{font-size:1.3rem;font-weight:800;line-height:1.2;margin-bottom:.25rem}
        .hero-text h1 span{color:#60a5fa}
        .hero-text p{color:#94a3b8;font-size:.83rem}
        .hero-meta{display:flex;gap:1.5rem;font-size:.8rem}
        .hero-meta-item{color:#64748b}
        .hero-meta-item strong{color:#fff;margin-right:.2rem}

        /* iframe area */
        #content{flex:1;overflow:hidden;position:relative;min-height:0}
        iframe{border:none;width:100%;height:100%;display:block}

        /* Footer */
        #footer{flex-shrink:0;height:38px;line-height:38px;text-align:center;border-top:1px solid #e8e4df;font-size:.75rem;color:#7a7a7a;background:#fff}
        #footer a{color:#2563eb;text-decoration:none;margin:0 .5rem}
        #footer a:hover{text-decoration:underline}

        /* States */
        .state{padding:3rem 2rem;text-align:center;color:#7a7a7a;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem}
        .state h2{font-size:1.1rem;color:#1a1a1a}
        .state p{font-size:.85rem}
        .state a{color:#2563eb}
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-brand">🎧 <span>Audio/Speech AI</span> Daily</div>
    <nav class="topbar-nav">
        <a href="./list.html">📋 Archive</a>
    </nav>
</div>

<div class="hero-strip">
    <div class="hero-inner">
        <div class="hero-text">
            <h1>Audio &amp; Speech AI <span>Research</span></h1>
            <p>每日筛选 Audio LLM、语音感知与理解、语音合成、Omni 全模态模型论文</p>
        </div>
        <div class="hero-meta" id="meta">
            <div class="hero-meta-item"><strong id="paper-count">—</strong> papers today</div>
            <div class="hero-meta-item">Updated <strong id="update-time">—</strong></div>
        </div>
    </div>
</div>

<div id="content">
    <div id="loading" class="state">
        <div style="font-size:2rem">⏳</div>
        <h2>Loading latest report…</h2>
        <p>Fetching from arXiv + GPT-5.4</p>
    </div>
    <iframe id="report-frame" style="display:none"></iframe>
</div>

<div id="footer">
    <a href="./index.html">Latest</a> · <a href="./list.html">Archive</a> · Powered by arXiv + GPT-5.4
</div>

<script>
async function init() {
    try {
        const r = await fetch('reports.json');
        const files = await r.json();
        if (!files || !files.length) throw new Error('No reports');
        document.getElementById('report-frame').src = './daily_html/' + files[0];
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report-frame').style.display = 'block';
        document.title = 'Audio/Speech AI Daily — ' + files[0].replace('.html','').replace(/_/g,'-');
    } catch(e) {
        document.getElementById('loading').innerHTML =
            '<div style="font-size:2rem">📭</div><h2>No reports yet</h2><p>Reports will appear after the first daily run. <a href="list.html">View archive</a></p>';
    }
}
window.onload = init;
</script>

</body>
</html>
