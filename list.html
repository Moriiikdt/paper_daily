<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Reports - Audio/Speech AI Daily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">
            📋 Audio/Speech AI Daily Reports
        </h1>
        <p class="text-center text-gray-500 mb-8">Historical reports (last 2 months)</p>
        
        <div id="report-list" class="space-y-4 max-w-2xl mx-auto">
            <p class="text-center text-gray-500">Loading...</p>
        </div>
        
        <div class="text-center mt-8">
            <a href="./index.html" class="text-teal-500 hover:text-teal-600">← Back to latest</a>
        </div>
    </div>

    <script>
        async function loadReports() {
            const list = document.getElementById('report-list');
            
            try {
                const resp = await fetch('reports.json');
                if (!resp.ok) throw new Error('Failed to load');
                const reports = await resp.json();
                
                list.innerHTML = '';

                if (!reports.length) {
                    list.innerHTML = '<p class="text-center text-gray-500">No reports yet</p>';
                    return;
                }

                reports.sort().reverse();
                
                reports.forEach(file => {
                    const date = file.replace('.html', '').replace(/_/g, '-');
                    const a = document.createElement('a');
                    a.href = 'daily_html/' + file;
                    a.textContent = '📄 ' + date;
                    a.className = 'block bg-white p-4 rounded shadow hover:bg-teal-50 transition';
                    list.appendChild(a);
                });
            } catch (err) {
                list.innerHTML = '<p class="text-center text-red-500">Error: ' + err.message + '</p>';
            }
        }
        document.addEventListener('DOMContentLoaded', loadReports);
    </script>
</body>
</html>
